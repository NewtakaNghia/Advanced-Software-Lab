<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Thêm Mới Sinh Viên</title>
    <style>
        body { font-family: 'Times New Roman', Times, serif; padding: 20px; }
        .form-container { max-width: 400px; padding: 20px; border: 1px solid #ccc; border-radius: 5px; background: #f9f9f9; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; }
        input[type="text"], input[type="email"], input[type="number"] {
            width: 100%; padding: 8px; box-sizing: border-box;
        }
        .btn { padding: 10px 15px; border: none; cursor: pointer; border-radius: 4px; color: white; }
        .btn-save { background-color: #28a745; }
        .btn-cancel { background-color: #6c757d; text-decoration: none; display: inline-block; }
    </style>
</head>
<body>
    <h2>Thêm Mới Sinh Viên</h2>
    <div class="form-container">
        <form th:action="@{/students/create}" th:object="${student}" method="POST">
            
            <div class="form-group">
                <label>ID Sinh Viên:</label>
                <input type="text" th:field="*{id}" required />
            </div>

            <div class="form-group">
                <label>Họ và Tên:</label>
                <input type="text" th:field="*{name}" required />
            </div>

            <div class="form-group">
                <label>Email:</label>
                <input type="email" th:field="*{email}" required />
            </div>

            <div class="form-group">
                <label>Tuổi:</label>
                <input type="number" th:field="*{age}" required />
            </div>

            <button type="submit" class="btn btn-save">Lưu Sinh Viên</button>
            <a th:href="@{/students}" class="btn btn-cancel">Hủy Bỏ</a>
        </form>
    </div>
</body>
</html>
